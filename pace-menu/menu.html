<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>pace-menu</title>

    <link rel="stylesheet" href="./style.css">

   
</head>

<body>

    <a href="../index.html" class="back-link">
  ← Back to Menu Selection
</a>
    <main>
        <input type="checkbox" id="cover_checkbox">
        <input type="checkbox" id="page1_checkbox">
        <input type="checkbox" id="page2_checkbox">
        <input type="checkbox" id="page3_checkbox">
        <input type="checkbox" id="page4_checkbox">

        <div id="flip_book">
            <div class="front_cover">
                <label for="cover_checkbox" id="cover"></label>
            </div>

           
            <div class="page" id="page1">
                <div class="front_page">
                    <label for="page1_checkbox"></label>
                    <img class="edge_shading" src="./assets/images/lc-m/22.png" alt="Front page edge shading">
                    <img class="front_content" src="./assets/images/lc-m/22.png" alt="Front content">
                </div>

                <div class="back_page">
                    <label for="page1_checkbox"></label>
                    <img class="edge_shading" src="./assets/images/lc-m/23.png" alt="Back page edge shading">
                    <img class="back_content" src="./assets/images/lc-m/23.png" alt="Back content">
                </div>
            </div>


            <div class="back_cover"></div>
        </div>

      


        
    </main>
</body>

</html>
